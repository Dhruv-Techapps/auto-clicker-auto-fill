name: feature [push]

on:
  pull_request:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run E2E tests against'
        type: environment
        default: Development
        required: true

env:
  FORCE_COLOR: 2
  NODE: 24

jobs:
  main:
    name: Check
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      actions: 'read'
    steps:
      - name: Clone repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '${{ env.NODE }}'
          registry-url: https://npm.pkg.github.com
          scope: ${{github.repository_owner}}
          cache: 'npm'
      - uses: nrwl/nx-set-shas@826660b82addbef3abff5fa871492ebad618c9e1 # v4
      - run: npm ci
      - run: npx nx report
      - run: npx nx format:check --verbose --exclude=acf-configs
      - run: npx nx affected --target=lint --parallel=3 --verbose --exclude=acf-configs
      - run: npx nx affected --target=test --parallel=3 --verbose --coverage --exclude=acf-configs
      - run: npx nx affected --target=typecheck --parallel=3 --verbose --exclude=acf-configs
      - name: Run codacy-coverage-reporter
        uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699 # v1.3.0
        if: ${{  github.actor != 'dependabot[bot]' }}
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          # or
          api-token: ${{ secrets.CODACY_API_TOKEN }}
          coverage-reports: 'packages/**/**/test-output/vitest/coverage/lcov.info'
          # or a comma-separated list for multiple reports
          # coverage-reports: <PATH_TO_REPORT>, <PATH_TO_REPORT>

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment || 'Development' }}
    permissions:
      contents: 'read'
      actions: 'read'
    steps:
      - name: Clone repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '${{ env.NODE }}'
          registry-url: https://npm.pkg.github.com
          scope: ${{github.repository_owner}}
          cache: 'npm'
      - uses: nrwl/nx-set-shas@826660b82addbef3abff5fa871492ebad618c9e1 # v4
      - run: npm ci
      - name: Cache Playwright Chromium browser
        id: playwright-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-chromium-${{ runner.os }}-
      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
      - name: Install Playwright OS dependencies only (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: Build dependency packages
        run: npx nx run-many -t build
        env:
          VITE_PUBLIC_VARIANT: ${{ vars.VITE_PUBLIC_VARIANT }}
          VITE_PUBLIC_CHROME_EXTENSION_ID: ${{ vars.VITE_PUBLIC_CHROME_EXTENSION_ID }}
          VITE_PUBLIC_I18N: ${{ vars.VITE_PUBLIC_I18N }}
          VITE_PUBLIC_URL: ${{ vars.VITE_PUBLIC_URL }}
          VITE_PUBLIC_NAME: ${{ vars.VITE_PUBLIC_NAME }}
          VITE_PUBLIC_GOOGLE_ADS_SLOT: ${{ vars.VITE_PUBLIC_GOOGLE_ADS_SLOT }}
          VITE_PUBLIC_GOOGLE_ADS_CLIENT: ${{ vars.VITE_PUBLIC_GOOGLE_ADS_CLIENT }}
          VITE_PUBLIC_FIREBASE_API_KEY: ${{ vars.VITE_PUBLIC_FIREBASE_API_KEY }}
          VITE_PUBLIC_FIREBASE_DATABASE_URL: ${{ vars.VITE_PUBLIC_FIREBASE_DATABASE_URL }}
          VITE_PUBLIC_FIREBASE_PROJECT_ID: ${{ vars.VITE_PUBLIC_FIREBASE_PROJECT_ID }}
          VITE_PUBLIC_FIREBASE_BUCKET: ${{ vars.VITE_PUBLIC_FIREBASE_BUCKET }}
          VITE_PUBLIC_FIREBASE_FUNCTIONS_URL: ${{ vars.VITE_PUBLIC_FIREBASE_FUNCTIONS_URL }}
          VITE_PUBLIC_RELEASE_VERSION: ${{ github.ref_name }}
          VITE_PUBLIC_OTEL_EXPORTER_OTLP_ENDPOINT: ${{ vars.VITE_PUBLIC_OTEL_EXPORTER_OTLP_ENDPOINT }}
          VITE_PUBLIC_OTEL_EXPORTER_OTLP_TOKEN: ${{ secrets.VITE_PUBLIC_OTEL_EXPORTER_OTLP_TOKEN }}
          VITE_PUBLIC_UNINSTALL_URL: ${{ vars.VITE_PUBLIC_UNINSTALL_URL }}
          DISCORD_CLIENT_ID: ${{ vars.DISCORD_CLIENT_ID }}
          OAUTH_CLIENT_ID: ${{ vars.OAUTH_CLIENT_ID }}
          EDGE_OAUTH_CLIENT_ID: ${{ vars.EDGE_OAUTH_CLIENT_ID }}
          API_SECRET: ${{ vars.API_SECRET }}
          MEASUREMENT_ID: ${{ vars.MEASUREMENT_ID }}
      - name: Run E2E tests
        run: npx nx e2e acf-options-page
        env:
          CI: true
          VITE_PUBLIC_VARIANT: ${{ vars.VITE_PUBLIC_VARIANT }}
          VITE_PUBLIC_CHROME_EXTENSION_ID: ${{ vars.VITE_PUBLIC_CHROME_EXTENSION_ID }}
          VITE_PUBLIC_I18N: ${{ vars.VITE_PUBLIC_I18N }}
          VITE_PUBLIC_URL: ${{ vars.VITE_PUBLIC_URL }}
          VITE_PUBLIC_NAME: ${{ vars.VITE_PUBLIC_NAME }}
          VITE_PUBLIC_GOOGLE_ADS_SLOT: ${{ vars.VITE_PUBLIC_GOOGLE_ADS_SLOT }}
          VITE_PUBLIC_GOOGLE_ADS_CLIENT: ${{ vars.VITE_PUBLIC_GOOGLE_ADS_CLIENT }}
          VITE_PUBLIC_FIREBASE_API_KEY: ${{ vars.VITE_PUBLIC_FIREBASE_API_KEY }}
          VITE_PUBLIC_FIREBASE_DATABASE_URL: ${{ vars.VITE_PUBLIC_FIREBASE_DATABASE_URL }}
          VITE_PUBLIC_FIREBASE_PROJECT_ID: ${{ vars.VITE_PUBLIC_FIREBASE_PROJECT_ID }}
          VITE_PUBLIC_FIREBASE_BUCKET: ${{ vars.VITE_PUBLIC_FIREBASE_BUCKET }}
          VITE_PUBLIC_FIREBASE_FUNCTIONS_URL: ${{ vars.VITE_PUBLIC_FIREBASE_FUNCTIONS_URL }}
          VITE_PUBLIC_RELEASE_VERSION: ${{ github.ref_name }}
          VITE_PUBLIC_OTEL_EXPORTER_OTLP_ENDPOINT: ${{ vars.VITE_PUBLIC_OTEL_EXPORTER_OTLP_ENDPOINT }}
          VITE_PUBLIC_OTEL_EXPORTER_OTLP_TOKEN: ${{ secrets.VITE_PUBLIC_OTEL_EXPORTER_OTLP_TOKEN }}
          VITE_PUBLIC_UNINSTALL_URL: ${{ vars.VITE_PUBLIC_UNINSTALL_URL }}
          DISCORD_CLIENT_ID: ${{ vars.DISCORD_CLIENT_ID }}
          OAUTH_CLIENT_ID: ${{ vars.OAUTH_CLIENT_ID }}
          EDGE_OAUTH_CLIENT_ID: ${{ vars.EDGE_OAUTH_CLIENT_ID }}
          API_SECRET: ${{ vars.API_SECRET }}
          MEASUREMENT_ID: ${{ vars.MEASUREMENT_ID }}
      - name: Upload Playwright report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: playwright-report
          path: apps/acf-options-page/test-output/
          retention-days: 7
